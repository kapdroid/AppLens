# Shared strict ruleset for Flutter packages. Same strictness contract as the
# pure-Dart analysis_options.yaml, layered on flutter_lints for the widget rules.
# Flutter packages include this via `include: ../../analysis_options_flutter.yaml`.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    invalid_annotation_target: error
    unused_import: error
    unused_local_variable: error
    dead_code: error
    todo: info
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    - prefer_relative_imports
    - always_declare_return_types
    - avoid_dynamic_calls
    - cancel_subscriptions
    - close_sinks
    - only_throw_errors
    - unawaited_futures
    - prefer_final_locals
    - avoid_redundant_argument_values
