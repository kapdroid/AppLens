# The filled-cart state — distinguished from an empty cart by cart_count > 0.
identity:
  route: /cart
  anchors: [list_cart_items, btn_place_order, lbl_total]
  flags: { cart_count: ">0" }
payload:
  assertions:
    - { type: widget_exists, key: btn_place_order }
    # The total is dynamic, so tier 1 only checks the label is present; the
    # semantic tier (2.5) verifies its text against a recorded baseline.
    - { type: widget_exists, key: lbl_total }
  edges:
    - { action: tap, key: btn_place_order, target: confirm }
    # The only way into the filled cart is "add to cart" from a product, so
    # back pops to that product (not the catalog).
    - { action: back, target: product }
  tags: [shopping]
  owner: team-shop
