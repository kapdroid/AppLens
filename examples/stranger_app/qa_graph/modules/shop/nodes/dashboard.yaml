# Entry node. Includes the shared app bar fragment to prove composition.
includes: [shared/overlays/app_bar]
identity:
  route: /
  anchors: [btn_start_shopping, btn_view_cart]
payload:
  assertions:
    - { type: widget_exists, key: btn_start_shopping }
    - { type: text_equals, key: lbl_welcome, value: Welcome }
  edges:
    - { action: tap, key: btn_start_shopping, target: catalog }
    - { action: tap, key: btn_view_cart, target: cart }
  tags: [sanity]
  owner: team-shop
