# Entry node. Includes the shared app bar fragment to prove composition.
includes: [shared/overlays/app_bar]
identity:
  route: /
  anchors: [btn_start_shopping, btn_view_cart]
payload:
  assertions:
    - { type: widget_exists, key: btn_start_shopping }
    - { type: text_equals,   key: btn_start_shopping, value: "Start shopping" }
    - { type: text_equals, key: lbl_welcome, value: Welcome }
  edges:
    - { action: tap, key: btn_start_shopping, target: catalog }
    - { action: tap, key: btn_view_cart, target: cart }
    - { action: tap, key: btn_account, target: account.login }
    - { action: tap, key: btn_help, target: support.help }
    - { action: tap, key: btn_settings, target: support.settings }
  visual_baselines:
    - { capture: full_screen, state: approved, image: "sha256:a159ce44ae1316544f86344f0fb4eeb378c2915c5bada7db6fa6788d1d6a6381" }
  structural_baselines:
    - { state: approved, snapshot: "sha256:c08ee4dd4baa9a458f10327f8a5cfff820da126c46323ddc2dcb9c2e2ba03c30" }
  watch:
    keys: [lbl_welcome, btn_start_shopping]
  tags: [sanity]
  owner: team-shop
