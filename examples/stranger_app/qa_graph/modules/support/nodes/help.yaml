# Help screen. Sanity-tagged so smoke covers the support module.
includes: [shared/overlays/app_bar]
identity:
  route: /help
  anchors: [lbl_help, btn_open_settings]
payload:
  assertions:
    - { type: widget_exists, key: lbl_help }
  edges:
    - { action: tap, key: btn_open_settings, target: settings }
    - { action: back, target: shop.dashboard }
  visual_baselines:
    - { capture: full_screen, state: approved, image: "sha256:94e95ff29e6b75c169554b3dac4d0e911745d93315e3735c3c4e5f64d03c253e" }
  structural_baselines:
    - { state: approved, snapshot: "sha256:10932ed0153979e33ffc601bfeb828f9cde415f125f8c033d5ba32e5d9f3f3e4" }
  watch:
    keys: [lbl_help, btn_open_settings]
  tags: [support, sanity]
  owner: team-support
