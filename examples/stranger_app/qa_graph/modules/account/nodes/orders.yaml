# Past orders. Tapping an order reorders it — a cross-module jump into the shop
# product detail.
includes: [shared/overlays/app_bar]
identity:
  route: /orders
  anchors: [list_orders]
payload:
  assertions:
    - { type: widget_exists, key: list_orders }
  edges:
    - { action: tap, key: order_0, target: shop.product }
    - { action: back, target: profile }
  tags: [account]
  owner: team-account
