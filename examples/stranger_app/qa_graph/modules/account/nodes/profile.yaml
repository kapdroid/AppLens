# The signed-in profile. Sanity-tagged so smoke covers the account module.
includes: [shared/overlays/app_bar]
identity:
  route: /profile
  anchors: [lbl_account_name, btn_view_orders]
payload:
  assertions:
    - { type: widget_exists, key: lbl_account_name }
  edges:
    - { action: tap, key: btn_view_orders, target: orders }
    - { action: tap, key: btn_logout, target: shop.dashboard }
  visual_baselines:
    - { capture: full_screen, state: approved, image: "sha256:46dde5eefd5eca879224938a16da1fd5ffc5ba86a6df2a2e389d9538ce45b574" }
  tags: [account, sanity]
  owner: team-account
