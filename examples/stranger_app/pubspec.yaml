name: stranger_app
description: A small demo Flutter app wired up end-to-end — AppLens's permanent zero-special-access proof.
publish_to: none
version: 1.0.0
environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # AppLens Tier-0 integration: dev-dependencies only, no production code touched.
  applens_core: any
  applens_runner: any
  applens_crawler: any
  applens_cli: any

# The qa_graph is bundled as assets so on-device runs can load it (the host CLI
# reads it from the filesystem instead).
flutter:
  assets:
    - qa_graph/applens.yaml
    - qa_graph/shared/overlays/app_bar.yaml
    - qa_graph/modules/shop/shop.module.yaml
    - qa_graph/modules/shop/nodes/
    - qa_graph/modules/account/account.module.yaml
    - qa_graph/modules/account/nodes/
    - qa_graph/modules/support/support.module.yaml
    - qa_graph/modules/support/nodes/
    - qa_graph/goldens/
